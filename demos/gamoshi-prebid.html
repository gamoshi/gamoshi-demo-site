<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamoshi Prebid Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f9f9f9; }
    header { background: #222; color: #fff; padding: 1rem; text-align: center; }
    main { max-width: 900px; margin: 2rem auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px #0001; }
    .ad-slot { /* Default width and height, will be overridden by JS */ width: 300px; height: 250px; background: #eee; border: 2px dashed #bbb; display: flex; align-items: center; justify-content: center; margin: 2rem auto; font-size: 1.2rem; color: #888; }
    .content { margin-bottom: 2rem; }
  </style>
</head>
<body>
  <header>
    <h1>Gamoshi Prebid Demo</h1>
    <p>Demonstrates Prebid.js with the Gamoshi adapter.</p>
  </header>
  <main>
    <section class="content">
      <h2>Sample Ad Placement</h2>
      <p>This is a demonstration of a 300x250 ad slot using Prebid.js and the Gamoshi adapter.</p>
    </section>
    <div class="ad-slot" id="gamoshi-ad-slot">
      Ad Slot 300x250
    </div>

    <hr>
    <h2>Live Configuration:</h2>
    <h3>Prebid AdUnits:</h3>
    <pre id="prebidConfigOutput"></pre>
    <hr>

    <!-- Prebid.js and Gamoshi Adapter integration scripts -->
    <script src="https://cdn.jsdelivr.net/npm/prebid.js@latest/dist/prebid.js"></script>
    <script type="application/javascript">
      // Function to get URL parameters
      function getUrlParameter(name) {
        name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
        var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
        var results = regex.exec(location.search);
        return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
      };

      // Get parameters from URL or use defaults
      var supplyPartnerIdFromUrl = getUrlParameter('supply_partner_id') || '26787'; // Default Supply Partner ID
      var purlFromUrl = getUrlParameter('purl') || window.location.href; // Default PURL
      var adWidthFromUrl = parseInt(getUrlParameter('adw')) || 300; // Default Ad Width
      var adHeightFromUrl = parseInt(getUrlParameter('adh')) || 250; // Default Ad Height

      // Update ad slot placeholder text and style
      const adSlotDiv = document.getElementById('gamoshi-ad-slot');
      if (adSlotDiv) {
        adSlotDiv.textContent = `Ad Slot ${adWidthFromUrl}x${adHeightFromUrl}`;
        adSlotDiv.style.width = `${adWidthFromUrl}px`;
        adSlotDiv.style.height = `${adHeightFromUrl}px`;
      }

      var adUnits = [{
        code: 'gamoshi-ad-slot',
        mediaTypes: {
          video : {
             playerSize : [adWidthFromUrl, adHeightFromUrl],
             context: 'outstream',
            mimes: ['video/mp4', 'video/webm'],
          }
        },
        bids: [{
          bidder: 'gamoshi',
          params: {
            supplyPartnerId: supplyPartnerIdFromUrl, // Use value from URL or default
            placementId: 'gamoshi-ad-slot',
          }
        }]
      }];
      pbjs.que = pbjs.que || [];
      pbjs.que.push(function() {
        pbjs.addAdUnits(adUnits);
        pbjs.requestBids({
          bidsBackHandler: function() {
            pbjs.renderAd(document, pbjs.getHighestCpmBids('gamoshi-ad-slot')[0].adId);
          }
        });
        // Display Prebid config
        document.getElementById('prebidConfigOutput').textContent = JSON.stringify(adUnits, null, 2);
      });
    </script>
  </main>
</body>
</html>
