// ── logging ─────────────────────────────────────────────────────────────────
var fireCount = {};
function logPixel(url) {
  if (!url) return;
  var cls = 'log-info', type = 'pixel';
  if (url.includes('/imp/'))       { cls = 'log-imp';  type = 'IMP TRACKER'; }
  else if (url.includes('/win_'))  { cls = 'log-win';  type = 'WIN NOTICE'; }
  else if (url.includes('/bill_')) { cls = 'log-bill'; type = 'BILL NOTICE'; }
  else if (url.includes('/page_v')){ cls = 'log-pv';   type = 'PAGE VIEW'; }
  // key by type + full URL so different tracker URLs are never conflated
  var key = type + '|' + url;
  fireCount[key] = (fireCount[key] || 0) + 1;
  var count = fireCount[key];
  var warn = count > 1 ? ' ⚠️ DUPLICATE #' + count : '';
  addLog('[' + type + warn + '] ' + truncate(url), cls + (count > 1 ? ' log-imp' : ''));
}
function logScript(url) {
  if (!url) return;
  var cls = 'log-aa', type = 'SCRIPT';
  if (url.includes('aa.js'))     { type = 'aa.js (Pixalate)'; }
  else if (url.includes('celtra')){ type = 'Celtra'; }
  // key by type + url so different scripts tracked separately
  var key = type + '|' + url;
  fireCount[key] = (fireCount[key] || 0) + 1;
  var count = fireCount[key];
  var warn = count > 1 ? ' ⚠️ DUPLICATE #' + count : '';
  addLog('[' + type + warn + '] ' + truncate(url), cls + (count > 1 ? ' log-imp' : ''));
}
function addLog(msg, cls) {
  var el = document.createElement('div');
  el.className = 'log-entry ' + (cls || 'log-info');
  var ts = new Date().toISOString().substr(11, 12);
  el.textContent = ts + '  ' + msg;
  var log = document.getElementById('log');
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}
function truncate(s) {
  return s.length > 120 ? s.substr(0, 120) + '...' : s;
}

// catch JS errors from ad scripts and show in log

// ── ad render ────────────────────────────────────────────────────────────────
var renderCount = 0;
var _injectedScripts = [];

function renderAd() {
  renderCount++;
  addLog('--- render #' + renderCount + ' ---', 'log-info');

  // remove scripts injected by previous renders so they don't pile up
  _injectedScripts.forEach(function(s) {
    try { s.parentNode && s.parentNode.removeChild(s); } catch(e) {}
  });
  _injectedScripts = [];

  var container = document.getElementById('ad-container');
  container.innerHTML = getAdm();

  // innerHTML doesn't execute scripts — manually clone and inject each one
  var scripts = container.querySelectorAll('script');
  scripts.forEach(function(s) {
    var ns = _createElement('script'); // bypass our override — src setter applied below
    if (s.getAttribute('src')) {
      ns.src = s.getAttribute('src');  // goes through prototype setter for logging
      logScript(ns.src);
    } else {
      ns.textContent = s.textContent;
    }
    _injectedScripts.push(ns);
    document.body.appendChild(ns);
  });
}

function clearAd() {
  _injectedScripts.forEach(function(s) {
    try { s.parentNode && s.parentNode.removeChild(s); } catch(e) {}
  });
  _injectedScripts = [];
  document.getElementById('ad-container').innerHTML = '<span style="color:#555;font-size:11px">cleared</span>';

  addLog('--- cleared ---', 'log-info');
}
